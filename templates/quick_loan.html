{% extends "base.html" %}
{% load static %}
{% block title %}Quick Loan{% endblock %}

{% block content %}
<style>
  body{
    margin:0;
    min-height:100vh;
    background: 
      linear-gradient(rgba(0,0,0,.08), rgba(0,0,0,.12)),
      url("{% static 'img/SL-012322-48100-03.webp' %}") center / cover no-repeat fixed !important;
    opacity: 1 !important;
    color:#fff;
  }

  .wrap{ align-items:flex-start; }

  .page{
    width: min(520px, 94vw);
    margin: 0 auto;
    padding: 14px 14px 24px;
    box-sizing: border-box;
  }

  /* ✅ Main card - Dashboard Blue Style */
  .cardx{
    position: relative;
    background: linear-gradient(180deg, #061127fd 0%, #0356C5 100%) !important;
    border-radius: 18px;
    padding: 18px;
    border: 1px solid rgba(125,184,255,0.3) !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
    overflow: hidden;
    margin-bottom: 14px;
    transition: all .22s ease;
  }
  
  .cardx:hover{
    transform: translateY(-1px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.5) !important;
  }

  /* ✅ Back button - Blue style */
  .back-btn{
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 42px;
    padding: 0 22px;
    border-radius: 12px;
    background: #1A2F4E;
    color: #7db8ff;
    font-weight: 800;
    text-decoration: none;
    border: 1px solid rgba(125,184,255,0.4);
    box-shadow: 0 6px 18px rgba(0,0,0,.25);
    transition: all .25s ease;
    margin-bottom: 16px;
  }

  .back-btn:hover{
    transform: translateY(-1px);
    border-color: rgba(125,184,255,0.7);
    box-shadow: 0 8px 24px rgba(0,65,130,.35);
  }
  
  .back-btn:active{
    transform: translateY(0px);
    opacity: .92;
  }

  @media (max-width:520px){
    .back-btn{ height: 40px; padding: 0 18px; font-size: 13px; }
  }

  /* Form fields */
  .field label{
    display: block;
    font-weight: 800;
    font-size: 14px;
    margin-bottom: 8px;
    color: #fff;
    letter-spacing: 0.02em;
  }

  input[type="number"]{
    width:100%;
    height: 48px;
    padding: 0 16px;
    border-radius: 12px;
    border: 1px solid rgba(125,184,255,0.3);
    background: #1A2F4E;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    box-sizing: border-box;
    transition: all .2s ease;
  }
  
  input[type="number"]:focus{
    outline: none;
    border-color: rgba(125,184,255,0.6);
    box-shadow: 0 0 0 3px rgba(125,184,255,0.15);
  }
  
  input[type="number"]::placeholder{
    color: #7db8ff;
    opacity: 0.6;
  }
  
  input[readonly]{ 
    opacity: 0.8;
    background: #152238;
  }

  /* ✅ Loan terms grid */
  .term-grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:10px;
    margin-top:10px;
  }
  
  @media(max-width:520px){
    .term-grid{ grid-template-columns:repeat(3,1fr); }
  }
  
  /* Default term button */
  .term-btn{
    padding:14px 0;
    border-radius: 12px;
    border: 1px solid rgba(125,184,255,0.3);
    background: #1A2F4E;
    color: #7db8ff;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    transition: all .2s ease;
  }
  
  .term-btn:hover{
    border-color: rgba(125,184,255,0.5);
    background: #243b5a;
    transform: translateY(-1px);
  }
  
  .term-btn:active{ 
    transform: scale(.98); 
  }
  
  /* ✅ SELECTED term button - WHITE like Continue button */
  .term-btn.active{
    background: linear-gradient(180deg, #f5f5f5 0%, #e0e0e0 100%) !important;
    border: none !important;
    color: #333 !important;
    box-shadow: 0 6px 0 #bdbdbd, 0 4px 15px rgba(0,0,0,0.15) !important;
    font-weight: 900;
    transform: translateY(-2px);
  }
  
  .term-btn.active:active{
    transform: translateY(4px);
    box-shadow: 0 2px 0 #bdbdbd, 0 2px 8px rgba(0,0,0,0.15) !important;
  }
  
  .term-btn:disabled{
    opacity: .55;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  .hint{ 
    margin-top: 10px; 
    font-size: 13px;
    color: #7db8ff;
    opacity: 0.85;
  }

  /* Summary section */
  .summary{
    margin-top: 16px;
    border-top: 1px solid rgba(125,184,255,0.2);
    padding-top: 16px;
    display: grid;
    gap: 10px;
    font-size: 14px;
  }
  
  .summary .row{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  
  .summary .k{ 
    color: #7db8ff;
    font-weight: 600;
  }
  
  .summary .v{ 
    font-weight: 900;
    color: #fff;
    font-size: 15px;
  }

  /* ✅ Continue button - White style */
  .cta{ 
    margin-top: 16px; 
    width: 100%;
    height: 52px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(180deg, #f5f5f5 0%, #e0e0e0 100%) !important;
    color: #333 !important;
    font-weight: 900;
    font-size: 15px;
    letter-spacing: 0.03em;
    cursor: pointer;
    box-shadow: 0 6px 0 #bdbdbd, 0 4px 15px rgba(0,0,0,0.15) !important;
    transition: all .1s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .cta:hover:not(:disabled){
    transform: translateY(-2px);
    box-shadow: 0 8px 0 #bdbdbd, 0 6px 20px rgba(0,0,0,0.2) !important;
  }
  
  .cta:active:not(:disabled){
    transform: translateY(4px);
    box-shadow: 0 2px 0 #bdbdbd, 0 2px 8px rgba(0,0,0,0.15) !important;
  }
  
  .cta:disabled{
    opacity: .65 !important;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: 0 6px 0 #bdbdbd, 0 4px 15px rgba(0,0,0,0.15) !important;
  }

  /* Status pill in summary */
  .status-pill{
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 900;
    background: rgba(125,184,255,0.15);
    border: 1px solid rgba(125,184,255,0.4);
    color: #7db8ff;
  }

</style>

<div class="page">

  <!-- ===== Card 1: Amount/Term ===== -->
  <div class="cardx">
    <a class="back-btn" href="{% url 'dashboard' %}">Back</a>

    <div class="field">
      <label>Loan amount (Min 100,000 • Max 5,000,000)</label>
      <input
        type="number"
        id="qAmount"
        min="100000"
        max="5000000"
        placeholder="Enter amount"
        {% if loan %}readonly{% endif %}
      >
      <div id="amountError" style="display:none; margin-top:8px; padding:10px 14px; border-radius:10px; background:rgba(220,38,38,0.15); border:1px solid rgba(220,38,38,0.4); color:#fca5a5; font-size:13px; font-weight:700;"></div>
    </div>

    <div class="field" style="margin-top:16px;">
      <label>Loan terms</label>
      <input type="hidden" id="qTerm">

      <div class="term-grid">
        <button type="button" class="term-btn" data-term="6"  {% if loan %}disabled{% endif %}>6</button>
        <button type="button" class="term-btn" data-term="12" {% if loan %}disabled{% endif %}>12</button>
        <button type="button" class="term-btn" data-term="24" {% if loan %}disabled{% endif %}>24</button>
        <button type="button" class="term-btn" data-term="36" {% if loan %}disabled{% endif %}>36</button>
        <button type="button" class="term-btn" data-term="48" {% if loan %}disabled{% endif %}>48</button>
        <button type="button" class="term-btn" data-term="60" {% if loan %}disabled{% endif %}>60</button>
      </div>

      <div class="hint" id="qHint">Choose months</div>
    </div>

    <div class="summary" aria-live="polite">
      <div class="row"><div class="k">Amount of loan</div><div class="v" id="qSumAmount">—</div></div>
      <div class="row"><div class="k">Interest rate</div><div class="v">0.5%</div></div>
      <div class="row"><div class="k">Loan period</div><div class="v" id="qSumTerm">—</div></div>
      <div class="row"><div class="k">Monthly repayment</div><div class="v" id="qSumMonthly">—</div></div>
      {% if loan %}
      <div class="row" style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(125,184,255,0.2);">
        <div class="k">Status</div>
        <span class="status-pill">SUBMITTED</span>
      </div>
      {% endif %}
    </div>

    <button class="cta" type="button" id="goApply" disabled>
      Continue to Application
    </button>
  </div>

<script>
  const amountEl = document.getElementById("qAmount");
  const termEl = document.getElementById("qTerm");
  const hint = document.getElementById("qHint");

  const outAmount = document.getElementById("qSumAmount");
  const outTerm = document.getElementById("qSumTerm");
  const outMonthly = document.getElementById("qSumMonthly");

  const btns = document.querySelectorAll(".term-btn");
  const goBtn = document.getElementById("goApply");

  function fmt(n){
    try { return Number(n).toLocaleString(); } catch (e) { return String(n); }
  }

  const amountError = document.getElementById("amountError");

  function update(){
    const amount = Number(amountEl?.value || 0);
    const term = Number(termEl?.value || 0);

    if (outAmount) outAmount.textContent = amount > 0 ? ("PHP " + fmt(amount)) : "—";
    if (outTerm) outTerm.textContent = term > 0 ? (term + " months") : "—";

    // Validate amount range
    const belowMin = amount > 0 && amount < 100000;
    const aboveMax = amount > 5000000;
    if (amountError){
      if(belowMin){
        amountError.textContent = "Minimum loan amount is PHP 100,000. Please enter minimum loan amount.";
        amountError.style.display = "block";
      } else if(aboveMax){
        amountError.textContent = "Maximum loan amount is PHP 5,000,000. Please enter maximum loan amount.";
        amountError.style.display = "block";
      } else {
        amountError.style.display = "none";
      }
    }
    if (amountEl) amountEl.style.borderColor = (belowMin || aboveMax) ? "rgba(220,38,38,0.7)" : "";

    const rate = 0.005;
    if(amount >= 100000 && amount <= 5000000 && term > 0){
      const total = amount + (amount * rate * term);
      const monthly = total / term;
      if (outMonthly) outMonthly.textContent = "PHP " + fmt(Math.round(monthly));

      {% if not loan %}
        goBtn.disabled = false;
        goBtn.style.opacity = "1";
      {% endif %}
    } else {
      if (outMonthly) outMonthly.textContent = "—";
      {% if not loan %}
        goBtn.disabled = true;
        goBtn.style.opacity = ".65";
      {% endif %}
    }
  }

  btns.forEach((b)=>{
    b.addEventListener("click", ()=>{
      {% if loan %} return; {% endif %}
      btns.forEach((x)=>x.classList.remove("active"));
      b.classList.add("active");
      if (termEl) termEl.value = b.dataset.term || "";
      if (hint) hint.textContent = (b.dataset.term || "") + " months";
      update();
    });
  });

  if (amountEl){
    amountEl.addEventListener("input", ()=>{
      {% if loan %} return; {% endif %}
      update();
    });
  }

  {% if loan %}
    if (amountEl) amountEl.value = "{{ loan.amount }}";
    if (termEl) termEl.value = "{{ loan.term_months }}";

    btns.forEach((b)=>{
      if ((b.dataset.term || "") === "{{ loan.term_months }}"){
        b.classList.add("active");
        if (hint) hint.textContent = "{{ loan.term_months }} months";
      } else {
        b.classList.remove("active");
      }
    });

    goBtn.textContent = "Submitted";
    goBtn.disabled = true;
    goBtn.style.opacity = ".65";
  {% else %}
    // ===== PERSIST amount + term across page closes (localStorage) =====
    const QL_KEY = "quickLoan_{{ request.user.id }}";
    function saveQL(){
      try {
        localStorage.setItem(QL_KEY, JSON.stringify({
          amount: amountEl ? amountEl.value : "",
          term:   termEl   ? termEl.value   : ""
        }));
      } catch(e){}
    }
    function restoreQL(){
      try {
        const saved = JSON.parse(localStorage.getItem(QL_KEY) || "{}");
        if(saved.amount && amountEl){
          amountEl.value = saved.amount;
        }
        if(saved.term && termEl){
          termEl.value = saved.term;
          btns.forEach((b)=>{
            if((b.dataset.term || "") === String(saved.term)){
              b.classList.add("active");
              if(hint) hint.textContent = saved.term + " months";
            }
          });
        }
      } catch(e){}
    }

    // Restore on load
    restoreQL();

    // Save on every change
    if(amountEl) amountEl.addEventListener("input", saveQL);
    btns.forEach((b)=>{ b.addEventListener("click", saveQL); });

    goBtn.addEventListener("click", ()=>{
      const amount = amountEl?.value || "";
      const term = termEl?.value || "";
      if(!amount || !term) return;
      // Clear storage after navigating to application page
      try { localStorage.removeItem(QL_KEY); } catch(e){}
      window.location.href = "{% url 'loan_info' %}?amount=" + encodeURIComponent(amount) + "&term=" + encodeURIComponent(term);
    });
  {% endif %}

  update();
</script>
{% endblock %}
