{% extends "base.html" %}
{% block title %}Credit Score{% endblock %}
{% block content %}

<style>
  :root{
    --text:#94a3b8;
    --text2:#cbd5e1;

    /* chart colors (match image2) */
    --c-navy:#06344d;
    --c-blue:#3b6aa0;
    --c-mag:#8f1d67;
    --c-teal:#1a94a0;
    --c-yellow:#f2b200;
  }

  .cs-wrap{ width:min(980px, 96vw); margin:0 auto; }

  /* ✅ keep a soft frame (looks like card) */
  .cs-frame{
    border-radius: 18px;
    padding: 14px;
    background: rgba(0, 0, 0, 0.678);
    border: 2px solid rgba(255, 255, 255, 0.404);
    box-shadow: 0 18px 60px rgba(0, 0, 0, 0.863);
  }

  .cs-title{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom: 10px;
  }
  .cs-title h2{
    margin:0; font-size: 22px; color:#fff;
    font-weight: 950; letter-spacing:.02em;
  }
  .cs-chip{
    padding: 8px 14px; border-radius: 999px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.10);
    color: var(--text2); font-weight: 800; font-size: 12px;
  }

  /* ✅ donut area MUST stay relative, so center text never moves */
  .donut-area{
    position: relative;
    display:grid;
    place-items:center;
    padding: 16px 8px 10px;
    isolation: isolate;
  }

  .donut{
    width: min(520px, 92vw);
    height: auto;
    display:block;
    filter: drop-shadow(0 16px 40px rgba(0,0,0,.55));
  }

  /* ✅ center text ALWAYS in center */
  .center-text{
    position:absolute;
    inset: 0;
    display:grid;
    place-items:center;
    pointer-events:none;
    z-index: 3;
  }
  .center-stack{
  width: 140px;
  max-width: 140px;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
}
.center-stack .big{ font-size: 34px; line-height:1; }
.center-stack .sub{ font-size: 11px; line-height:1.1; }
.center-stack .mid{ font-size: 18px; line-height:1.1; }

  /* ===== donut segment animation ===== */
  .seg{
    fill:none;
    stroke-linecap: butt;
    stroke-width: 30;
    transform: rotate(-90deg);
    transform-origin: 50% 50%;
    stroke-dasharray: 0 999;
    stroke-dashoffset: 0;
    filter: drop-shadow(0 0 0 rgba(0,0,0,0));
  }
  .seg.animate{ animation: draw 900ms cubic-bezier(.2,.9,.2,1) forwards; }
  @keyframes draw{
    0%   { stroke-dasharray: 0 999; filter: drop-shadow(0 0 0 rgba(0,0,0,0)); }
    60%  { filter: drop-shadow(0 10px 24px rgba(0,0,0,.35)); }
    100% { filter: drop-shadow(0 16px 40px rgba(0,0,0,.55)); }
  }

/* mobile adjust */
@media (max-width: 520px){
  .lb.r35{ right: -8px !important; }
}
@media (max-width: 380px){
  .lb.r35{ right: -4px !important; }
}
/* low credit mode */
.cs-low .lb strong{ color:#ff4d4d !important; }
.cs-low .lb span{ color: rgba(255,255,255,.75) !important; }
.cs-low .center-stack .big{ color:#ff4d4d !important; }
.cs-low .center-stack .sub{ color: rgba(255,255,255,.85) !important; }
.cs-low .center-stack .mid{ color: rgba(255,77,77,.28) !important; } /* ghost red */
/* ===== INSIDE DONUT COLOR ONLY (NO OUTSIDE CHANGE) ===== */

/* default = Excellent (green) */
.center-stack .mid{
  color: rgba(34, 197, 94, .85) !important;   /* bright green */
  text-shadow: 0 0 18px rgba(34,197,94,.25);
}

/* make red inside donut more vivid */
.cs-low .center-stack .big{ color:#ff2d2d !important; }
.cs-low .center-stack .mid{
  color: rgba(255, 45, 45, .90) !important;   /* stronger red */
  text-shadow: 0 0 18px rgba(255,45,45,.25);
}
/* ===== Score Slides (below donut) ===== */
.cs-slides{
  margin-top: 14px;
  padding: 14px;
  border-radius: 18px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  box-shadow: 0 14px 40px rgba(0,0,0,.35);
  overflow: hidden;
}

.cs-slide-track{
  display:flex;
  width: 300%;
  transition: transform 420ms ease;
  will-change: transform;
}

.cs-slide{
  width: 100%;
  min-height: 120px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding: 12px 10px;
  gap: 12px;
}

.cs-slide-left{ flex: 1; }
.cs-slide-big{
  font-size: 44px;
  font-weight: 950;
  color: #fff;
  letter-spacing:.02em;
}
.cs-slide-text{
  margin-top: 6px;
  color: rgba(255,255,255,.62);
  font-weight: 800;
  line-height: 1.2;
}

.cs-country{
  color: rgba(255,255,255,.82);
  font-weight: 950;
}

.cs-slide-right{
  width: 96px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
}

.cs-badge{
  padding: 10px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.10);
  color: rgba(255,255,255,.80);
  font-weight: 900;
  font-size: 12px;
}

/* mini pie */
.cs-mini-pie{
  width: 74px; height: 74px;
  display:grid;
  place-items:center;
}
.cs-mini-pie svg{ width: 74px; height: 74px; }
.cs-mini-pie .pie-bg{
  fill:none;
  stroke: rgba(255,255,255,.10);
  stroke-width: 8;
}
.cs-mini-pie .pie-fg{
  fill:none;
  stroke: rgba(255, 120, 120, .85);
  stroke-width: 8;
  stroke-linecap: round;
  transform: rotate(-90deg);
  transform-origin: 50% 50%;
  stroke-dasharray: 0 999;
  filter: drop-shadow(0 10px 20px rgba(0,0,0,.35));
}

/* dots */
.cs-dots{
  display:flex;
  gap: 8px;
  justify-content:center;
  align-items:center;
  padding-top: 8px;
}
.cs-dots .dot{
  width: 7px; height: 7px;
  border-radius: 999px;
  background: rgba(255,255,255,.20);
}
.cs-dots .dot.active{
  background: rgba(255,255,255,.85);
}

/* mobile tune */
@media (max-width: 520px){
  .cs-slide{ min-height: 110px; }
  .cs-slide-big{ font-size: 34px; }
  .cs-mini-pie{ width: 64px; height: 64px; }
  .cs-mini-pie svg{ width: 64px; height: 64px; }
}
/* ✅ reduce big text by 10px */
.cs-slide-big{ font-size: 30px !important; }

@media (max-width: 520px){
  .cs-slide-big{ font-size: 26px !important; }
}

/* ✅ refresh button style */
.cs-refresh{
  width: fit-content;
  margin: 12px auto 0;
  display:flex;
  align-items:center;
  gap: 10px;
  padding: 12px 18px;
  border-radius: 14px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.10);
  color: rgba(255,255,255,.85);
  font-weight: 900;
  cursor: pointer;
}
.cs-refresh:active{ transform: scale(.98); }
.cs-slide{ justify-content:flex-start !important; }
.cs-slide-left{ width:100% !important; }
/* ✅ Refresh button -> blue */
.cs-refresh{
  background: linear-gradient(180deg, #1e78ff, #0b4fd6) !important;
  border: 1px solid rgba(255,255,255,.18) !important;
  color: #ffffff !important;
  box-shadow: 0 12px 28px rgba(30,120,255,.28) !important;
}
.cs-refresh:hover{ filter: brightness(1.06); }
.cs-refresh:active{ transform: scale(.98); filter: brightness(.98); }

/* ✅ Card below donut -> milky (more visible) */
.cs-slides{
  background: linear-gradient(180deg, rgba(15,40,75,.85), rgba(5,20,45,.92)) !important;
  border: 1px solid rgba(120,170,255,.25) !important;
  box-shadow: 0 18px 55px rgba(0,0,0,.45) !important;
}
/* ✅ Refresh score use same font as page */
.cs-refresh{
  font-family: inherit !important;
  font-weight: 900 !important;   /* ដូច style ទូទៅ */
  letter-spacing: .02em !important;
}

/* ✅ Text in red-box card: blur -> clear animation */
@keyframes csTextReveal{
  from{ opacity: 0; filter: blur(10px); transform: translateY(6px); }
  to  { opacity: 1; filter: blur(0);   transform: translateY(0); }
}

/* apply to all text inside the card */
.cs-slides .cs-slide-left{
  animation: csTextReveal 1600ms ease-out both;
}

.donut-area{ position: relative; }

.cs-frame{
  box-shadow: 0 14px 34px rgba(0,0,0,.45) !important;
}

/* =========================
   FINAL: MOBILE + PC PERFECT DONUT LABELS
   Paste at END of <style>
   ========================= */

/* wrapper safe */
.cs-wrap{
  width: 100% !important;
  max-width: 980px !important;
  margin: 0 auto !important;
  padding: 0 12px !important;
}

/* DONUT size variable (auto shrink on phone) */
.donut-area{
  --donut: clamp(260px, 74vw, 520px);     /* ✅ donut shrink on mobile */
  --gap: 18px;                             /* space between donut & labels */
  position: relative;
  display: grid;
  place-items: center;
  overflow: visible;
  padding: 22px 10px;                      /* small safe padding */
}

.donut{
  width: var(--donut) !important;
  height: auto;
  display: block;
}

/* label anchor */
.donut-area .labels{
  position: absolute;
  left: 50%;
  top: 50%;
  width: 0;
  height: 0;
  pointer-events: none;
  z-index: 2;
}

/* label base */
.donut-area .labels .lb{
  position: absolute;
  left: 0;
  top: 0;

  /* ✅ radius depends on donut size (so NEVER go offscreen) */
  --r: calc((var(--donut) / 2) + var(--gap));
  --w: clamp(120px, 34vw, 200px);         /* ✅ label width auto */
  --a: 0deg;

  width: var(--w);
  text-align: center;
  line-height: 1.15;
  font-weight: 850;
  color: rgba(255,255,255,.72);

  transform:
    translate(-50%, -50%)
    rotate(var(--a))
    translate(var(--r))
    rotate(calc(-1 * var(--a)));
}

/* text sizes auto */
.donut-area .labels .lb strong{
  display: block;
  font-size: clamp(22px, 6vw, 40px);
  font-weight: 950;
  color: #4f7fb1;
  letter-spacing: .02em;
}
.donut-area .labels .lb span{
  display: block;
  margin-top: 4px;
  font-size: clamp(11px, 3.2vw, 14px);
  font-weight: 800;
  color: rgba(255,255,255,.68);
}

/* angles like your reference image */
.donut-area .labels .lb.t10{ --a:-90deg; }  /* top */
.donut-area .labels .lb.r35{ --a:  18deg; } /* right */
.donut-area .labels .lb.b30{ --a:  90deg; } /* bottom */
.donut-area .labels .lb.l15{ --a: 210deg; } /* left-bottom */
.donut-area .labels .lb.l10{ --a: 160deg; } /* left */

/* keep inside screen on very small phones */
@media (max-width: 380px){
  .donut-area{ --gap: 12px; }
}

    <defs>
      <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="var(--c-navy)"/>
        <stop offset="35%"  stop-color="var(--c-blue)"/>
        <stop offset="65%"  stop-color="var(--c-mag)"/>
        <stop offset="82%"  stop-color="var(--c-teal)"/>
        <stop offset="100%" stop-color="var(--c-yellow)"/>
      </linearGradient>
    </defs>

    <circle cx="110" cy="110" r="70" fill="none" stroke="rgba(255,255,255,.10)" stroke-width="30"></circle>
    <circle class="score-ring" cx="110" cy="110" r="70"></circle>
  </svg>

</div>
      <!-- ✅ END DONUT AREA -->

      <!-- ✅ Refresh button (OUTSIDE donut-area) -->
      <button type="button" class="cs-refresh" id="csRefreshBtn">
        ↻ Refresh score
      </button>

      <!-- ✅ Score Insight (SINGLE CARD ONLY - no slide) -->
<div class="cs-slides" aria-label="Score insight">
  <div class="cs-slide-track" style="width:100%; transform:none;">
    <div class="cs-slide" style="justify-content:space-between;">
      <div class="cs-slide-left">
        <div class="cs-slide-big" id="csPct1">60%</div>
        <div class="cs-slide-text">
          your score is better than<br>
          <span id="csPctText1">60%</span> of people in <span class="cs-country">Philippines</span>
        </div>
      </div>

      <div class="cs-slide-right">
  <div class="cs-bars" aria-label="Comparison bars">
    <div class="cs-bar c1" style="--v:15"><span>10%</span></div>
    <div class="cs-bar c2" style="--v:21"><span>19%</span></div>
    <div class="cs-bar c3" style="--v:32"><span>31%</span></div>
  </div>
</div>
    </div>
  </div>
</div>
      <!-- ✅ END SLIDES -->

    </div>
  </div>
</div>
<script>
/* ===== 1.5) Score -> progress ring (AUTO RANGE + COLOR) ===== */
(function(){
  const score = parseInt("{{ credit_score|default:500 }}", 10) || 500;

  // ✅ auto-detect score range
  const MIN = 450;
  const MAX = 500;

  const t = Math.max(0, Math.min(1, (score - MIN) / (MAX - MIN)));

  const ring = document.querySelector(".score-ring");
  if(!ring) return;

  const r = 70;
  const C = 2 * Math.PI * r;
  const len = t * C;

  // start empty then animate
  ring.style.strokeDasharray = `0 ${C}`;
  requestAnimationFrame(() => {
    ring.classList.add("animate");
    ring.style.strokeDasharray = `${len} ${C - len}`;
  });
})();
/* ===== 2) Score mode + card text swap + replay blur->clear animation ===== */
(function(){
  const score = parseInt("{{ credit_score|default:500 }}", 10) || 0;

  // ✅ your system: MAX score = 500
  const MIN = 0;
  const MAX = 500;

  const t = Math.max(0, Math.min(1, (score - MIN) / (MAX - MIN)));

  const ring = document.querySelector(".score-ring");
  if(!ring) return;

  const scoreEl = document.getElementById("csScore");
  const pctEl   = document.getElementById("csPct");

  const r = 70;
  const C = 2 * Math.PI * r;
  const len = t * C;

  // ✅ donut duration (match your CSS transition time)
  const DURATION = 2200;

  // start empty
  ring.style.strokeDasharray = `0 ${C}`;

  // animate ring
  setTimeout(() => {
    ring.classList.add("animate");
    ring.style.strokeDasharray = `${len} ${C - len}`;
  }, 150);

  // ✅ animate number + percent
  const start = performance.now();
  function tick(now){
    const p = Math.min(1, (now - start) / DURATION);

    const curScore = Math.round(score * p);
    const curPct   = Math.round((t * 100) * p);

    if(scoreEl) scoreEl.textContent = curScore;
    if(pctEl)   pctEl.textContent = curPct + "%";

    if(p < 1) requestAnimationFrame(tick);
    else{
      if(scoreEl) scoreEl.textContent = score;
      if(pctEl)   pctEl.textContent = Math.round(t * 100) + "%";
    }
  }
  requestAnimationFrame(tick);
})();
// ✅ bring back Excellent / Low score text
(function(){
  const score = parseInt("{{ credit_score|default:500 }}", 10) || 0;
  const frame = document.querySelector(".cs-frame");
  const mid   = document.getElementById("csMid");
  const level = document.getElementById("csLevel");

  if(score <= 450){
    frame && frame.classList.add("cs-low");
    const bars = document.querySelector(".cs-slide-right");
    if(bars) bars.style.display = "none";
    if(mid) mid.textContent = "Low Credit";
    if(level) level.textContent = "Low Score";
  }else{
    frame && frame.classList.remove("cs-low");
    if(mid) mid.textContent = "Excellent Credit";
    if(level) level.textContent = "Excellent Score";
  }
})();
(function(){
  const score = parseInt("{{ credit_score|default:500 }}", 10) || 0;

  const pctBig  = document.getElementById("csPct1");
  const textWrap = document.querySelector(".cs-slide-text");

  if(score <= 450){
    if(pctBig) pctBig.textContent = "Alert";
    if(textWrap){
      textWrap.innerHTML =
        `A significant change was detected in your credit report, please review your activity immediately to protect your identity. <b>Check Activity.</b>`;
    }
  } else {
    if(pctBig) pctBig.textContent = "60%";
    if(textWrap){
      textWrap.innerHTML =
        `your score is better than<br><span id="csPctText1">60%</span> of people in <span class="cs-country">Philippines</span>`;
    }
  }
})();
/* ===== 3) Refresh button ===== */
(function(){
  const btn = document.getElementById("csRefreshBtn");
  if(!btn) return;
  btn.addEventListener("click", () => window.location.reload());
})();
</script>
{% endblock %}
