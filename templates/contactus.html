{% extends "base.html" %}
{% load static %}
{% block title %}Contact{% endblock %}

{% block content %}
<style>
/* ===== BUTTON FONT ===== */
button, .btn, .back-btn{
  font-family: "Inter", "Poppins", system-ui, -apple-system, Segoe UI, sans-serif !important;
  font-weight: 600;
  letter-spacing: .03em;
}

/* ===== PAGE LAYOUT ===== */
.wrap{ align-items:flex-start; }
.page{
  width: min(520px, 94vw);
  margin: 0 auto;
  padding: 14px 14px 32px;
  box-sizing: border-box;
}

/* ===== BACK BUTTON - Same as wallet page ===== */
.top-actions{
  margin-top: 12px;
  display: flex;
  justify-content: flex-start;
}
.back-btn{
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 42px;
  padding: 0 22px;
  border-radius: 12px;
  background: #1A2F4E;
  color: #7db8ff;
  font-weight: 800;
  text-decoration: none;
  border: 1px solid #7db8ff;
  box-shadow: 0 6px 18px rgba(0,0,0,.25);
  opacity: 1;
  transition: all .15s ease;
}
.back-btn:hover{
  transform: translateY(-1px);
  border-color: rgba(100,150,255,.7);
  box-shadow: 0 8px 24px rgba(0,65,130,.35);
}
.back-btn:active{
  transform: translateY(0px);
  opacity: .92;
}

/* Mobile adjustments */
@media (max-width:520px){
  .top-actions{ padding: 10px 12px 0; }
  .back-btn{ height: 40px; padding: 0 18px; font-size: 13px; }
}

/* ===== CARD STYLE - Same as wallet page ===== */
.cardx{
  position: relative;
  background: linear-gradient(180deg, #061127fd 0%, #0356C5 100%) !important;
  border-radius: 18px;
  padding: 18px;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  border: 1px solid rgba(125,184,255,0.3) !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
  opacity: 1 !important;
  overflow: hidden;
  margin-bottom: 12px;
  transition: border-color .22s ease, box-shadow .22s ease, transform .22s ease;
}
.cardx:hover{
  transform: translateY(-1px);
  box-shadow: 0 8px 28px rgba(0,0,0,0.5) !important;
}

/* Title and subtitle */
.title{
  font-weight: 950;
  font-size: 18px;
  letter-spacing: .04em;
  margin: 0 0 6px;
  color: #fff;
}
.sub{
  font-size: 12px;
  opacity: .80;
  margin: 0;
  color: #fff;
}

/* ===== FORM FIELDS - Same as wallet page ===== */
label{
  display: block;
  font-size: 12px;
  opacity: .90;
  margin: 10px 0 6px;
  font-weight: 800;
  color: #fff;
}

input, textarea{
  width: 100%;
  box-sizing: border-box;
  border-radius: 12px;
  border: 1px solid #1E3A5F;
  background: #1A2F4E;
  color: #fff;
  padding: 12px 14px;
  outline: none;
  opacity: 1;
  font-size: 14px;
  transition: all .15s ease;
}

textarea{
  min-height: 110px;
  resize: none;
}

input:focus, textarea:focus{
  border-color: #7db8ff;
  box-shadow: 0 0 0 3px rgba(125,184,255,.2);
  background: #1A2F4E;
}

input::placeholder, textarea::placeholder{
  color: #8899AA;
}

/* ===== SUBMIT BUTTON - Same gray style as Continue to Application ===== */
.btn{
  width: 100%;
  margin-top: 12px;
  border: none;
  border-radius: 14px;
  padding: 16px;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: .05em;
  color: #333 !important;
  cursor: pointer;
  background: linear-gradient(180deg, #f5f5f5 0%, #e0e0e0 100%) !important;
  box-shadow: 0 6px 0 #bdbdbd, 0 4px 15px rgba(0,0,0,0.15) !important;
  opacity: 1;
  transition: all .15s ease;
}
.btn:hover{
  background: linear-gradient(180deg, #ffffff 0%, #e8e8e8 100%) !important;
  box-shadow: 0 6px 0 #bdbdbd, 0 6px 20px rgba(0,0,0,0.2) !important;
}
.btn:active{
  transform: translateY(4px);
}

/* ===== ALERT SUCCESS ===== */
.alert-success{
  border: 1px solid #00C853;
  background: rgba(0,200,83,0.15);
  color: #4ade80;
  opacity: 1;
  padding: 12px 16px;
  border-radius: 12px;
  font-weight: 900;
  margin-bottom: 12px;
}

/* ===== TELEGRAM SECTION ===== */
.telegram-inline{
  text-align: center;
  margin: 6px 0 12px;
}

.tg-title{
  margin: 0 0 10px;
  font-weight: 950;
  font-size: 14px;
  opacity: .9;
  letter-spacing: .03em;
  color: #fff;
}

/* Telegram button - keep gold style or change to gray? */
.tg-btn{
  display: inline-flex;
  align-items: center;
  gap: 10px;
  height: 42px;
  padding: 0 18px;
  border-radius: 999px;
  background: linear-gradient(180deg, #f5f5f5 0%, #e0e0e0 100%) !important; /* ពណ៌ប្រផេះ/ស */
  color: #333 !important; /* ពណ៌ខ្មៅ */
  font-weight: 800;
  font-size: 13px;
  letter-spacing: .04em;
  text-decoration: none;
  box-shadow: 0 6px 0 #bdbdbd, 0 4px 15px rgba(0,0,0,0.15) !important;
  opacity: 1;
  transition: all .15s ease;
}
.tg-btn:hover{
  background: linear-gradient(180deg, #ffffff 0%, #e8e8e8 100%) !important;
  box-shadow: 0 6px 0 #bdbdbd, 0 6px 20px rgba(0,0,0,0.2) !important;
}
.tg-btn:active{
  transform: translateY(4px);
}

.tg-icon{
  width: 18px;
  height: 18px;
  object-fit: contain;
}

.tg-text{
  line-height: 1;
}
</style>

<div class="page">
  <!-- Telegram Section -->
  <div class="telegram-inline">
    <h4 class="tg-title">Telegram Contact</h4>
    <a href="https://t.me/CustomerServices24h_16868"
       target="_blank"
       class="tg-btn">
      <img src="{% static 'img/icons/telegram.png' %}"
           alt="Telegram"
           class="tg-icon">
      <span class="tg-text">Telegram</span>
    </a>
  </div>

  <!-- Contact Header Card -->
  <div class="cardx">
    <div class="title">CONTACT US</div>
    <p class="sub">Send us a message — we will contact you soon.</p>
  </div>

  {% if sent %}
    <div class="alert-success">
      ✅ Thank you! We will contact you soon.
    </div>
  {% endif %}

  <!-- Contact Form Card -->
  <div class="cardx">
    <form method="POST" action="/contact/">
      {% csrf_token %}

      <label>Full name</label>
      <input type="text" name="full_name" placeholder="Enter your full name" required>

      <label>Phone / WhatsApp</label>
      <input type="tel" name="phone" placeholder="Enter your phone number" required>

      <label>Subject (optional)</label>
      <input type="text" name="subject" placeholder="Enter subject">

      <label>Message</label>
      <textarea name="message" placeholder="Enter your message" required></textarea>

      <button class="btn" type="submit">Send Message</button>
    </form>
  </div>

  <!-- Back Button -->
  <div class="top-actions">
    <a class="back-btn" href="javascript:history.back()">
      Back
    </a>
  </div>
</div>
{% endblock %}
